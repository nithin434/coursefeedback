<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #1a1a1a;
    }
    
    .course-list {
      margin-bottom: 16px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
    }
    
    .course-item {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .course-item:hover {
      background: #f5f5f5;
    }
    
    .course-item:last-child {
      border-bottom: none;
    }
    
    .course-item input[type="checkbox"] {
      margin-right: 10px;
      cursor: pointer;
    }
    
    .course-name {
      font-size: 13px;
      color: #333;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
    }
    
    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    
    .btn-primary:hover {
      background: #1d4ed8;
    }
    
    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }
    
    .btn-secondary:hover {
      background: #d1d5db;
    }
    
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      display: none;
    }
    
    .status.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }
    
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
    
    .status.info {
      background: #dbeafe;
      color: #1e40af;
      display: block;
    }
    
    .select-all {
      padding: 8px 12px;
      background: #f9fafb;
      border-bottom: 2px solid #e5e7eb;
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    
    .select-all:hover {
      background: #f3f4f6;
    }
  </style>
</head>
<body>
  <h2>📝 Course Feedback Auto-Fill</h2>
  
  <div class="course-list" id="courseList">
    <div class="select-all" id="selectAll">
      <input type="checkbox" id="selectAllCheckbox">
      <label for="selectAllCheckbox" style="cursor: pointer; margin-left: 4px;">Select All Courses</label>
    </div>
    <div class="course-item" data-value="AM_CSE1008_00200">
      <input type="checkbox" class="course-checkbox">
      <span class="course-name">Theory of Computation</span>
    </div>
    <div class="course-item" data-value="AM_CSE2004_00100">
      <input type="checkbox" class="course-checkbox">
      <span class="course-name">Software Design and Architecture</span>
    </div>
    <div class="course-item" data-value="AM_CSE2013_00200">
      <input type="checkbox" class="course-checkbox">
      <span class="course-name">Information Theory and Coding</span>
    </div>
    <div class="course-item" data-value="AM_CSE4004_00400">
      <input type="checkbox" class="course-checkbox">
      <span class="course-name">Web Technologies</span>
    </div>
    <div class="course-item" data-value="AM_PHY2004_00110">
      <input type="checkbox" class="course-checkbox">
      <span class="course-name">Optoelectronics</span>
    </div>
    <div class="course-item" data-value="AM_STS4006_00200">
      <input type="checkbox" class="course-checkbox">
      <span class="course-name">Advanced Competitive Coding - II</span>
    </div>
  </div>
  
  <div class="button-group">
    <button class="btn-secondary" id="fillBtn">Fill Forms</button>
    <button class="btn-primary" id="autoSubmitBtn">Auto-Fill & Submit</button>
  </div>
  
  <div class="status" id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
